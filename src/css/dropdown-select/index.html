<head>
    <title>不使用 select，option 标签实现一个下拉选单</title>
</head>

<body>
    <!-- 思路：用div和li模拟 -->
    <div id="my-select" class="custom-select">
        <div class="select-header">
            <span class="placeholder">请选择</span>
            <i class="arrow"></i>
        </div>
        <ul class="select-options">
            <li data-value="1">选项一</li>
            <li data-value="2">选项二</li>
            <li data-value="3">选项三</li>
        </ul>
    </div>

    <style>
        .custom-select {
            position: relative;
            width: 200px;
            user-select: none;
            cursor: pointer;
        }

        .select-header {
            border: 1px solid #ccc;
            padding: 8px 12px;
        }

        .select-options {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            border: 1px solid #ccc;
            border-top: none;
            list-style: none;
            padding: 0;
            margin: 0;
            background: #fff;
            display: none;
        }

        .custom-select.is-open .select-options {
            display: block;
        }

        .select-options li {
            padding: 8px 12px;
        }

        .select-options li:hover {
            background-color: #f0f0f0;
        }

        .select-options li.selected {
            background-color: #e6f7ff;
            color: #1890ff;
        }
    </style>

    <script>
        const el = document.querySelector('#my-select');
        const header = el.querySelector('.select-header');
        const list = el.querySelector('.select-options');
        const placeholder = el.querySelector('.placeholder');
        let isOpen = false;

        // 切换开闭状态
        function toggle() {
            isOpen = !isOpen;
            el.classList.toggle('is-open', isOpen);
        }

        // 选择选项
        function selectItem(target) {
            const text = target.innerText;
            const value = target.getAttribute('data-value');

            placeholder.innerText = text;

            // 更新选中状态
            list.querySelectorAll('li').forEach(li => li.classList.remove('selected'));
            target.classList.add('selected');

            // 关闭下拉框
            isOpen = false;
            el.classList.remove('is-open');

            console.log('Selected:', value);
        }

        // 绑定事件
        header.addEventListener('click', (e) => {
            e.stopPropagation();
            toggle();
        });

        list.addEventListener('click', (e) => {
            if (e.target.tagName === 'LI') {
                selectItem(e.target);
            }
        });

        document.addEventListener('click', () => {
            if (isOpen) {
                isOpen = false;
                el.classList.remove('is-open');
            }
        });
    </script>
</body>
